<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Null</title>
</head>
<body>
   <script>

      // Null
      // Berbeda dengan undefined null bisa di bilang variable yang nilainya di deklarasikan Null
      // seperti let nama = null
      // Bedanya dengan undefined, kalo undefined varible belum di deklarasikan value apapun.

      let firstName = "Kiki";

      if (firstName === undefined) {
         console.info("Data berisi nilai undefined")
      } else if (firstName === null) {
         console.info("Data berisi null")
      } else {
         console.info(`Data berisi ${firstName}`)
      }

   </script>
</body>
</html>
