<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Tipe Data Boolean</title>
</head>
<body>

   <!-- Tipe Data Boolean -->
    <ul>
      <li>Tipe data boolean a/ tipe data yang hanya berisi data truthy atau falsy. Benar atau salah</li>
      <li>Benar di representasikan dengan kata kunci "true" dan salah "false"</li>
      <li>meski sederhana tapi boolean sering digunakan untuk berbagai fitur pemograman</li>
    </ul>

   <script>
      // type data boolean
      document.writeln(true) // untuk data benar
      document.writeln("<br>")
      document.writeln(false) // untuk data salah
   </script>
</body>
</html>
