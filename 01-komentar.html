<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Komentar</title>
</head>
<body>
   <ul>
      <li>Komentar a/ kode program yang tidak akan dieksekusi</li>
      <li>Komentar biasa digunakan untuk memberi petunjuk (informasi) terkait kode yang di tulis</li>
      <li>di JS kita bisa menambahkan komentar dengan memberi tanda // (diawal) atau /* ... (Isi code) ... */ kode</li>
   </ul>
   <script>
      // Ini adalah contoh komentar 1 baris
      document.writeln("<p> Hello Komentar 1 Baris </p>");

      // Ini komentar lebih dari satu baris
      document.writeln("<p> Ini komentar lebih dari 1 baris </p>")
   </script>
</body>
</html>
